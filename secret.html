<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACCESS GRANTED</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{

background:#050505;
color:#8cffb8;

padding:50px;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:repeating-linear-gradient(

transparent 0px,
transparent 3px,
rgba(255,255,255,.03) 4px

);

pointer-events:none;

}

.container{

max-width:900px;

margin:auto;

}

h1{

font-size:42px;

margin-bottom:20px;

color:white;

}

.status{

margin-bottom:40px;

padding:20px;

border:1px solid #33ff99;

background:#0f0f0f;

}

.file{

background:#111;

border:1px solid #333;

padding:20px;

margin-bottom:20px;

cursor:pointer;

transition:.3s;

}

.file:hover{

border-color:#33ff99;

transform:translateX(8px);

}

.hidden{

display:none;

margin-top:15px;

color:#ccc;

line-height:1.8;

}

.back{

display:inline-block;

margin-top:40px;

color:#77ccff;

text-decoration:none;

}

.warning{

margin-top:40px;

color:#ff5555;

font-size:14px;

opacity:.6;

}

#secretMessage{

margin-top:40px;

color:#ffff88;

display:none;

font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<h1>ACCESS GRANTED</h1>

<div class="status">

Observer Level : 0

<br><br>

접속 권한 확인 완료.

</div>

<div class="file">

 삭제된 기록

<div class="hidden">

기록은 삭제되었지만

일부 데이터가 복구되었습니다.

</div>

</div>

<div class="file">

 실험 기록

<div class="hidden">

실험 결과 :

예상과 다른 반응이 발생했습니다.

</div>

</div>

<div class="file">

 UNKNOWN

<div class="hidden">

관측자는 아직 모든 기록을 열람할 수 없습니다.

</div>

</div>

<div id="secretMessage">

관측자는 이미 여러 번 이곳에 방문했습니다.

</div>

<a class="back" href="index.html">

<h2>🔐 ACCESS CODE</h2>

<p>관측 코드를 입력하세요.</p>

<input id="codeInput" type="text">

<button onclick="checkCode()">

확인

</button>

<div id="result"></div>

    ← 메인으로 돌아가기

</a>

<div class="warning">

SYSTEM STATUS : STABLE

</div>

</div>

<script>

document.querySelectorAll(".file").forEach(file=>{

file.onclick=()=>{

file.querySelector(".hidden").classList.toggle("hidden");

};

});

if(Math.random()<0.15){

document.getElementById("secretMessage").style.display="block";

}

function checkCode(){

const code=document
.getElementById("codeInput")
.value
.toUpperCase();

const result=document
.getElementById("result");

if(code==="PUN-001"){

result.innerHTML=`

<h2>🔓 RECORD-004</h2>

<p>

제푼은 처음부터
관측자가 아니었다.

</p>

`;

}

else if(code==="EDEL-001"){

result.innerHTML=`

<h2>🔓 RECORD-005</h2>

<p>

에델의 기록 일부가 복구되었습니다.

</p>

`;

}

else{

result.innerHTML="❌ ACCESS DENIED";

}

}

</script>

</body>

</html>
