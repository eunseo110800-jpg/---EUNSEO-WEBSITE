<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>팀섭티튜의 아카이브</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Pretendard",sans-serif;
}

body{

background:linear-gradient(#f8fcff,#eef7ff);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:#444;

}

/* 떠다니는 별 */

.star{

position:absolute;

width:4px;
height:4px;

background:white;

border-radius:50%;

animation:float 12s linear infinite;

opacity:.6;

}

@keyframes float{

0%{

transform:translateY(100vh);

}

100%{

transform:translateY(-100px);

}

}

.container{

width:90%;
max-width:950px;

background:white;

padding:50px;

border-radius:35px;

box-shadow:0 20px 45px rgba(0,0,0,.08);

position:relative;

z-index:5;

}

h1{

font-size:48px;

margin-bottom:10px;

}

.sub{

font-size:18px;

color:#666;

margin-bottom:40px;

line-height:1.7;

}

.secret{

cursor:pointer;

transition:.3s;

}

.secret:hover{

color:#6aa8ff;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:25px;

}

.card{

background:#eef7ff;

border-radius:25px;

padding:35px;

text-align:center;

cursor:pointer;

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

background:#dcefff;

}

.card .icon{

font-size:45px;

margin-bottom:15px;

}

.card h2{

font-size:24px;

margin-bottom:10px;

}

.card p{

color:#666;

font-size:15px;

}

.info{

margin-top:45px;

padding:20px;

border-radius:20px;

background:#f7fbff;

display:flex;

justify-content:space-between;

align-items:center;

}

footer{

margin-top:25px;

text-align:center;

font-size:14px;

color:#999;

}

#fade{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:black;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

color:white;

opacity:0;

pointer-events:none;

transition:2s;

letter-spacing:8px;

z-index:999;

}

</style>

</head>

<body>

<div class="star" style="left:8%;animation-delay:0s;"></div>
<div class="star" style="left:24%;animation-delay:3s;"></div>
<div class="star" style="left:40%;animation-delay:6s;"></div>
<div class="star" style="left:55%;animation-delay:2s;"></div>
<div class="star" style="left:72%;animation-delay:8s;"></div>
<div class="star" style="left:90%;animation-delay:5s;"></div>

<div class="container">

<h1> 팀섭티튜</h1>

<div class="sub">

오늘도 관측을 시작합니다.<br>

세계는 계속 기록되고 있습니다.

<span class="secret" onclick="goSecret()">✨</span>

</div>

<div class="grid">

<div class="card">

<div class="icon"></div>

<h2>영상</h2>

<p>업로드된 영상</p>

</div>

<div class="card" onclick="location.href='archive.html'">

<div class="icon"></div>

<h2>자료실</h2>

<p>기록과 문서</p>

</div>

<div class="card" onclick="location.href='world.html'">

<div class="icon"></div>

<h2>세계관</h2>

<p>관측 기록</p>

</div>

<div class="card">

<div class="icon"></div>

<h2>공지</h2>

<p>업데이트 소식</p>

</div>

</div>

<div class="info">

<div>

<b> 제군력</b><br>

<span id="jegun"></span>

</div>

<div>

<b>상태</b><br>

관측 진행 중...

</div>

</div>

<footer>

Made with ♡ ✦

</footer>

</div>

<div id="fade">

ACCESSING...

</div>

<script>

function goSecret(){

let fade=document.getElementById("fade");

fade.style.opacity="1";

setTimeout(()=>{

location.href="secret.html";

},2000);

}

// 제군력 자동 계산
const start = new Date("2026-05-23");
const today = new Date();

let years = today.getFullYear() - start.getFullYear();
let months = today.getMonth() - start.getMonth();

if (months < 0) {
    years--;
    months += 12;
}

document.getElementById("jegun").textContent =
`${years}년 ${months}개월`;

</script>

</body>
</html>
