<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>팀섭티튜의 아카이브</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:#f6fbff;

color:#444;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.container{

background:white;

width:90%;
max-width:900px;

border-radius:30px;

padding:50px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

}

h1{

font-size:42px;

margin-bottom:15px;

}

p{

font-size:18px;

margin-bottom:40px;

}

.secret{

cursor:pointer;

transition:.3s;

}

.secret:hover{

color:#4ea4ff;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

}

.card{

background:#eef7ff;

border-radius:20px;

padding:35px;

text-align:center;

font-size:20px;

cursor:pointer;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

background:#d9eeff;

}

footer{

margin-top:40px;

text-align:center;

color:#888;

font-size:14px;

}

#fade{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:black;

opacity:0;

pointer-events:none;

transition:2s;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

color:white;

letter-spacing:8px;

}

</style>

</head>

<body>

<div class="container">

<h1>☁️ 팀섭티튜트의 아카이브</h1>

<p>

안녕하세요!<br>

오늘도 방문해 주셔서 감사합니다.<span class="secret" onclick="goArchive()">✨</span>

</p>

<div class="grid">

<div class="card">📺<br><br>영상</div>

<div class="card">📂<br><br>자료실</div>

<div class="card" onclick="location.href='world.html'">
🌎<br><br>세계관
</div>

<div class="card">📝<br><br>공지</div>

</div>

<footer>

Made with ♡ ✦

</footer>

</div>

<div id="fade">

ACCESSING...

</div>

<script>

function goArchive(){

let fade=document.getElementById("fade");

fade.style.opacity="1";

setTimeout(()=>{

window.location.href="archive.html";

},2200);

}

</script>

</body>
</html>
