<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>기록보관소</title>

<link rel="stylesheet" href="style.css">

<style>

.record{

background:white;

padding:25px;

margin-bottom:18px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

cursor:pointer;

transition:.3s;

}

.record:hover{

transform:translateY(-5px);

}

.record h2{

color:#5b8dff;

margin-bottom:10px;

}

.content{

display:none;

margin-top:20px;

padding-top:20px;

border-top:2px solid #eef5ff;

line-height:1.8;

}

.record.open .content{

display:block;

}

.locked{

opacity:.45;

cursor:not-allowed;

}

.back{

display:inline-block;

margin-top:25px;

text-decoration:none;

font-weight:bold;

color:#5b8dff;

}

</style>

</head>

<body>

<div class="container">

<h1> 기록보관소</h1>

<p>관측 가능한 기록입니다.</p>

<div class="record">

<h2>RECORD-001</h2>

<div class="content">

제군력 1년.

첫 번째 기록이 생성되었습니다.

</div>

</div>

<div class="record">

<h2>RECORD-002</h2>

<div class="content">

관측 대상 "제푼"이 최초로 확인되었습니다.

</div>

</div>

<div class="record">

<h2>RECORD-003</h2>

<div class="content">

시호와 이안의 기록이 추가되었습니다.

</div>

</div>

<div class="record locked">

<h2>████████</h2>

<p>잠긴 기록입니다.</p>

</div>

<div class="record locked">

<h2>???</h2>

<p>열람 권한이 없습니다.</p>

</div>

<a class="back" href="index.html">

← 메인으로 돌아가기

</a>

</div>

<script>

document.querySelectorAll(".record:not(.locked)").forEach(card=>{

card.onclick=()=>{

card.classList.toggle("open");

}

});

</script>

</body>

</html>
