<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제군력이란?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'맑은 고딕', sans-serif;
}

body{
    background:#f6fbff;
    color:#444;
}

header{
    background:white;
    padding:30px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

header h1{
    font-size:40px;
}

header p{
    color:#777;
    margin-top:10px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.card h2{
    color:#5c8dff;
    margin-bottom:15px;
}

.info{
    background:#eef7ff;
    border-left:6px solid #6aa8ff;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.back{
    display:inline-block;
    margin-top:20px;
    color:#5c8dff;
    text-decoration:none;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}

</style>
</head>

<body>

<header>

<h1> 제군력이란?</h1>

<p>세계관에서 사용되는 독자적인 시간 체계</p>

</header>

<div class="container">

<div class="card">

<h2>제군력</h2>

<p>
제군력은 이 세계관에서 사용하는 고유한 시간 체계입니다.
</p>

<br>

<p>
제군력은 <b>채널이 개설된 날</b>을 기준으로 시작되며,
그 날은 <b>제군력 1년 1월 1일</b>로 기록됩니다.
</p>

<div class="info">

<b> 시간 변환 규칙</b>

<br><br>

현실의 <b>7일</b>은

<b>제군력 약 1.5개월</b>에 해당합니다.

</div>

<br>

<p>
모든 사건과 기록은 제군력을 기준으로 작성됩니다.
</p>

</div>

<div class="card">

<h2>예시</h2>

<p>

현실에서 일주일이 지나면,

세계관에서는 약 한 달 반이 흐른 것으로 기록됩니다.

</p>

</div>

<a class="back" href="world.html">

← 세계관으로 돌아가기

</a>

</div>

<footer>

</footer>

</html>
